{% extends "base.html" %}

{% block title %}Register - CareerPath AI{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="auth-box">
            <h2>Create an Account</h2>
            <form method="post" id="registerForm">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" name="username" id="username" required class="form-control">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" required class="form-control">
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" name="phone" id="phone" required class="form-control">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" required class="form-control">
                </div>
                <button type="submit" class="btn btn-primary">Register</button>
            </form>
            <p class="auth-link">Already have an account? <a href="/login/">Login here</a></p>
        </div>
    </div>
</section>

<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = {
        username: document.getElementById('username').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        phone: document.getElementById('phone').value
    };
    
    try {
        const response = await fetch('/api/auth/users/register/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(formData)
        });
        
        if (response.ok) {
            window.location.href = '/login/';
        } else {
            const error = await response.json();
            alert('Registration failed: ' + JSON.stringify(error));
        }
    } catch (error) {
        console.error('Error:', error);
    }
});
</script>
{% endblock %}
